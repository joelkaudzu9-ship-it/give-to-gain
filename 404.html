<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | KUHeS Church</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #f1f1f3;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(4rem, 12vw, 8rem);
            background: linear-gradient(135deg, #F97316, #FACC15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #b0b0b8; margin: 1rem 0 2rem; font-size: 1.1rem; line-height: 1.7; }
        a {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            background: linear-gradient(135deg, #F97316, #EF4444);
            color: #0a0a0f;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(249,115,22,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>This page has wandered off. <br>But the mission hasn't.</p>
        <a href="/">← Back to Give to Gain</a>
    </div>
</body>
</html>
